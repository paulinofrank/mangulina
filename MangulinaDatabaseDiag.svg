<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill:#020617; }
    .box { fill:#0b1220; stroke:#38bdf8; stroke-width:2; rx:14; }
    .core { fill:#020617; stroke:#22c55e; stroke-width:3; rx:18; }
    .title { fill:#e5e7eb; font:700 20px system-ui, sans-serif; }
    .field { fill:#9ca3af; font:14px system-ui, sans-serif; }
    .pk { fill:#f97316; font-weight:700; }
    .fk { fill:#22c55e; font-weight:700; }
    .rel { stroke:#64748b; stroke-width:2.5; fill:none; }
    .arrow { marker-end:url(#arrowhead); }
    .pill { fill:#1e293b; stroke:#38bdf8; stroke-width:1.5; rx:10; }
    .pill-text { fill:#e2e8f0; font:13px system-ui, sans-serif; }
  </style>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#38bdf8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="1920" height="1080"/>

  <!-- Title -->
  <text x="960" y="70" text-anchor="middle" fill="#e5e7eb" font="700 30px system-ui, sans-serif">
    Mangulina™ Database Diagram (Radial Layout)
  </text>

  <!-- CENTER: RECORDINGS -->
  <rect class="core" x="810" y="430" width="300" height="260"/>
  <text class="title" x="830" y="460">RECORDINGS</text>
  <text class="field pk" x="830" y="490">id (PK)</text>
  <text class="field" x="830" y="515">title</text>
  <text class="field fk" x="830" y="540">artist_id → artists.id</text>
  <text class="field" x="830" y="565">duration, views</text>
  <text class="field" x="830" y="590">mbid, metadata</text>

  <!-- LEFT: ARTISTS -->
  <rect class="box" x="200" y="380" width="320" height="240"/>
  <text class="title" x="220" y="410">ARTISTS</text>
  <text class="field pk" x="220" y="440">id (PK)</text>
  <text class="field" x="220" y="465">name</text>
  <text class="field" x="220" y="490">sort_name, type</text>
  <text class="field" x="220" y="515">mbid</text>
  <text class="field" x="220" y="540">province, origin_region</text>

  <!-- TOP: ARTIST_CREDITS -->
  <rect class="box" x="780" y="140" width="360" height="230"/>
  <text class="title" x="800" y="170">ARTIST_CREDITS</text>
  <text class="field pk" x="800" y="200">id (PK)</text>
  <text class="field fk" x="800" y="225">recording_id → recordings.id</text>
  <text class="field fk" x="800" y="250">release_id → releases.id</text>
  <text class="field fk" x="800" y="275">artist_id → artists.id</text>
  <text class="field" x="800" y="300">credited_name, join_phrase</text>
  <text class="field" x="800" y="325">sequence, role</text>

  <!-- RIGHT: RELEASES -->
  <rect class="box" x="1400" y="380" width="360" height="280"/>
  <text class="title" x="1420" y="410">RELEASES</text>
  <text class="field pk" x="1420" y="440">id (PK)</text>
  <text class="field" x="1420" y="465">title</text>
  <text class="field fk" x="1420" y="490">release_group_id → release_groups.id</text>
  <text class="field fk" x="1420" y="515">release_artist_id → artists.id</text>
  <text class="field fk" x="1420" y="540">label_id → labels.id</text>
  <text class="field" x="1420" y="565">cover_image_url, date</text>
  <text class="field" x="1420" y="590">mbid, metadata</text>

  <!-- TOP-RIGHT: RELEASE_GROUPS -->
  <rect class="box" x="1320" y="120" width="320" height="200"/>
  <text class="title" x="1340" y="150">RELEASE_GROUPS</text>
  <text class="field pk" x="1340" y="180">id (PK)</text>
  <text class="field" x="1340" y="205">title</text>
  <text class="field" x="1340" y="230">primary_type</text>
  <text class="field" x="1340" y="255">secondary_types</text>

  <!-- BOTTOM: TRACKS -->
  <rect class="box" x="780" y="760" width="360" height="230"/>
  <text class="title" x="800" y="790">TRACKS</text>
  <text class="field pk" x="800" y="820">id (PK)</text>
  <text class="field fk" x="800" y="845">recording_id → recordings.id</text>
  <text class="field fk" x="800" y="870">release_id → releases.id</text>
  <text class="field" x="800" y="895">track_number, disc_number</text>

  <!-- BOTTOM-RIGHT: LABELS -->
  <rect class="box" x="1400" y="740" width="320" height="200"/>
  <text class="title" x="1420" y="770">LABELS</text>
  <text class="field pk" x="1420" y="800">id (PK)</text>
  <text class="field" x="1420" y="825">name</text>
  <text class="field" x="1420" y="850">type, area</text>

  <!-- CURVED ARROWS WITH PILLS -->

  <!-- recordings → artists -->
  <path class="rel arrow" d="M 810 520 C 650 520, 650 500, 520 500" />
  <rect class="pill" x="640" y="480" width="180" height="28" />
  <text class="pill-text" x="650" y="500">artist_id → artists.id</text>

  <!-- recordings → artist_credits -->
  <path class="rel arrow" d="M 960 430 C 960 350, 960 350, 960 300" />
  <rect class="pill" x="900" y="330" width="220" height="28" />
  <text class="pill-text" x="910" y="350">id → artist_credits.recording_id</text>

  <!-- recordings → tracks -->
  <path class="rel arrow" d="M 960 690 C 960 740, 960 740, 960 760" />
  <rect class="pill" x="900" y="710" width="220" height="28" />
  <text class="pill-text" x="910" y="730">id → tracks.recording_id</text>

  <!-- tracks → releases -->
  <path class="rel arrow" d="M 1140 820 C 1300 700, 1300 650, 1400 650" />
  <rect class="pill" x="1250" y="690" width="220" height="28" />
  <text class="pill-text" x="1260" y="710">release_id → releases.id</text>

  <!-- releases → release_groups -->
  <path class="rel arrow" d="M 1560 380 C 1560 300, 1500 260, 1480 260" />
  <rect class="pill" x="1480" y="300" width="260" height="28" />
  <text class="pill-text" x="1490" y="320">release_group_id → release_groups.id</text>

  <!-- releases → labels -->
  <path class="rel arrow" d="M 1560 660 C 1560 720, 1560 720, 1560 740" />
  <rect class="pill" x="1480" y="690" width="200" height="28" />
  <text class="pill-text" x="1490" y="710">label_id → labels.id</text>

  <!-- artist_credits → artists -->
  <path class="rel arrow" d="M 780 260 C 650 260, 650 420, 520 420" />
  <rect class="pill" x="600" y="330" width="240" height="28" />
  <text class="pill-text" x="610" y="350">artist_id → artists.id</text>

  <!-- artist_credits → releases -->
  <path class="rel arrow" d="M 1140 260 C 1300 260, 1300 420, 1400 420" />
  <rect class="pill" x="1250" y="330" width="240" height="28" />
  <text class="pill-text" x="1260" y="350">release_id → releases.id</text>

</svg>